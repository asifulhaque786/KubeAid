rule_files:
  - prometheus.yaml

evaluation_interval: 1m

# Each case is separate so one scenario cannot mask another in assertions.
# Series use `0+AXn` (n+1 minutes of samples) so 5m `rate` / `for` and eval_time 10m are valid.

tests:
  # SCENARIO 1: service-a has 10% 403 errors (TraefikImmediateFailure should fire)
  - interval: 1m
    input_series:
      - series: 'traefik_service_requests_total{service="service-a", code="200"}'
        values: '0+90x30'
      - series: 'traefik_service_requests_total{service="service-a", code="403"}'
        values: '0+10x30'
    alert_rule_test:
      - eval_time: 10m
        alertname: TraefikImmediateFailure
        exp_alerts:
          - exp_labels:
              service: service-a
              code: "403"
              severity: warning
            exp_annotations:
              summary: HTTP rejection spike detected.
              description: Service 'service-a' is rejecting requests with a 403 status code (currently >5% of traffic). Investigate missing headers, bad auth, or WAF rules.

  # SCENARIO 2: service-b has 15% 404 (TraefikHigh4xxErrorRate should fire, not immediate)
  - interval: 1m
    input_series:
      - series: 'traefik_service_requests_total{service="service-b", code="200"}'
        values: '0+85x30'
      - series: 'traefik_service_requests_total{service="service-b", code="404"}'
        values: '0+15x30'
    alert_rule_test:
      - eval_time: 10m
        alertname: TraefikHigh4xxErrorRate
        exp_alerts:
          - exp_labels:
              service: service-b
              code: "404"
              severity: warning
            exp_annotations:
              summary: High HTTP client error rate (4XX) detected.
              description: Service 'service-b' is experiencing a high rate (>5%) of 404 errors. Investigate routing or client behavior.

  # SCENARIO 3: service-c has 1% 401 (no matching immediate-failure codes; no alerts)
  - interval: 1m
    input_series:
      - series: 'traefik_service_requests_total{service="service-c", code="200"}'
        values: '0+99x30'
      - series: 'traefik_service_requests_total{service="service-c", code="401"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 10m
        alertname: TraefikImmediateFailure
        exp_alerts: []
      - eval_time: 10m
        alertname: TraefikHigh4xxErrorRate
        exp_alerts: []

  # SCENARIO 4: service-d 50% 400 but only 4 req/min total (below volume floor; no TraefikImmediateFailure)
  - interval: 1m
    input_series:
      - series: 'traefik_service_requests_total{service="service-d", code="200"}'
        values: '0+2x30'
      - series: 'traefik_service_requests_total{service="service-d", code="400"}'
        values: '0+2x30'
    alert_rule_test:
      - eval_time: 10m
        alertname: TraefikImmediateFailure
        exp_alerts: []

  # SCENARIO 5: service-e 50% 404 but only 2 req/min total (below volume floor; no TraefikHigh4xxErrorRate)
  - interval: 1m
    input_series:
      - series: 'traefik_service_requests_total{service="service-e", code="200"}'
        values: '0+1x30'
      - series: 'traefik_service_requests_total{service="service-e", code="404"}'
        values: '0+1x30'
    alert_rule_test:
      - eval_time: 10m
        alertname: TraefikHigh4xxErrorRate
        exp_alerts: []

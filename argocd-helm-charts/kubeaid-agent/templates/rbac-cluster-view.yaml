{{/* Cluster-wide read for the right-sizing CRON's cross-namespace
     pod/owner-ref walks. `view` excludes secrets — see secret-reader Role. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeaid-agent.fullname" . }}-cluster-view
  labels:
    {{- include "kubeaid-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeaid-agent.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view

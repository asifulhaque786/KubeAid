{{/* Read secrets in the agent's own namespace — the ArgoCD project-role JWT
     lives here (kubeaid-cli ≥ v0.22.4). */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubeaid-agent.fullname" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeaid-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubeaid-agent.fullname" . }}-secret-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeaid-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeaid-agent.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubeaid-agent.fullname" . }}-secret-reader

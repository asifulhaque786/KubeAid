trivy-operator:
  # Scan every namespace except platform/system ones; tune per cluster.
  excludeNamespaces: ""
  targetNamespaces: ""

  # Enable Prometheus integration. The chart ships its own ServiceMonitor.
  serviceMonitor:
    enabled: true
    interval: 60s
    labels: {}

  # Surface per-CVE metrics so Alertmanager rules can target specific CVE IDs.
  operator:
    metricsContainerEnabled: true
    metricsVulnIdEnabled: true
    metricsExposedSecretInfo: true
    metricsConfigAuditInfo: true
    builtInTrivyServer: true
    scannerReportTTL: "24h"

  trivy:
    # Skip CVEs with no fix available — cuts a lot of noise on base images.
    ignoreUnfixed: true
    # Limit severities reported to keep storage/Prometheus cardinality manageable.
    severity: "CRITICAL,HIGH"
    # Use the operator-managed Trivy server pod (instead of one Trivy job per scan).
    storageClassEnabled: false

  # Resource limits for the operator + scanner pods.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# KubeAid-side toggles for Prometheus alert rules generated by templates/.
kubeaid:
  prometheusRule:
    enabled: true
    # Namespaces considered production for the critical-CVE alert.
    productionNamespaceRegex: "^(production|prod|prd)$"
    # How long a critical CVE must persist before the alert fires.
    for: "30m"
    severity: critical
    additionalLabels: {}
    additionalAnnotations: {}

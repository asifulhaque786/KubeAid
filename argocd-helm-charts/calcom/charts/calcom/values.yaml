replicaCount: 1

image:
  repository: harbor.obmondo.com/obmondo/calcom
  pullPolicy: IfNotPresent
  tag: 0.0.6

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

secretRef: "calcom"

# Non-secret env vars (literal values). Used for signup/org/OAuth lockdown; these keys
# are not read from secretRef (see deployment extraEnv block).
extraEnv:
  - name: NEXT_PUBLIC_DISABLE_SIGNUP
    value: "true"
  - name: ORGANIZATIONS_ENABLED
    value: "false"
  - name: ORGANIZATIONS_AUTOLINK
    value: "false"
  - name: GOOGLE_LOGIN_ENABLED
    value: "false"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: example.org
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}



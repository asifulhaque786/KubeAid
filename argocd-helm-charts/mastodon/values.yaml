global:
  postgresql:
    enabled: true
    instanceName: mastodon
    instances: 1
    size: 10Gi
    database: mastodon
    owner: mastodon
    monitoring:
      enablePodMonitor: true
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 100m
    backups:
      enabled: false
    logicalbackup:
      enabled: false

redis:
  enabled: true
  mode: standalone
  instanceName: mastodon-redis
  storage: 2Gi

mastodon:
  # Domain configuration
  local_domain: ""

  # Disable bundled databases - we use postgres-operator and redis-operator
  postgresql:
    enabled: false
    postgresqlHostname: "mastodon-pgsql-rw"
    postgresqlPort: 5432
    auth:
      database: mastodon
      username: mastodon
      existingSecret: "mastodon-pgsql-app"
      secretKeys:
        userPasswordKey: password

  redis:
    enabled: false
    hostname: "mastodon-redis"
    port: 6379

  elasticsearch:
    enabled: false

  # Mastodon secrets
  secrets:
    secret_key_base: "dummy"
    otp_secret: "dummy"
    vapid:
      private_key: "dummy"
      public_key: "dummy"
    activeRecordEncryption:
      primaryKey: "dummy"
      deterministicKey: "dummy"
      keyDerivationSalt: "dummy"
    existingSecret: "mastodon-secrets"

  # SMTP configuration
  smtp:
    server: ""
    port: 587
    from_address: ""
    domain: ""
    auth_method: plain
    enable_starttls: auto
    login: ""
    password: ""
    existingSecret: ""

  # S3 configuration for media storage using SeaweedFS
  s3:
    enabled: true
    bucket: "mastodon-media"
    endpoint: "http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333"
    hostname: ""
    region: "us-east-1"
    protocol: http
    access_key_id: ""
    secret_access_key: ""
    existingSecret: ""
    alias_host: ""

  # Streaming configuration
  streaming:
    replicas: 1

  # Web configuration
  web:
    replicas: 1

  # Sidekiq configuration
  sidekiq:
    replicas: 1

  # Ingress configuration - OVERRIDE in customer config
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      kubernetes.io/ingress.class: nginx
    hosts:
      - host: ""
        paths:
          - path: '/'
    tls:
      - secretName: mastodon-tls
        hosts:
          - ""

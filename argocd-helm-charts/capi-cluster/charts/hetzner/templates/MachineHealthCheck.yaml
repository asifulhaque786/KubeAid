{{/* Handling control-plane in HCloud. */}}
{{- if or (eq .Values.mode "hcloud") (eq .Values.mode "hybrid") }}
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineHealthCheck
metadata:
  name: {{ .Values.global.clusterName }}-control-plane-unhealthy-5m
spec:
  clusterName: {{ .Values.global.clusterName }}
  {{/* CAPI v1beta2 restructured MachineHealthCheck.spec:
         - unhealthyConditions  → checks.unhealthyNodeConditions
         - nodeStartupTimeout   → checks.nodeStartupTimeoutSeconds  (duration → int seconds)
         - timeout              → timeoutSeconds                    (duration → int seconds)
         - maxUnhealthy         → remediation.triggerIf.unhealthyLessThanOrEqualTo
       Same values as before, just moved/renamed. */}}
  checks:
    nodeStartupTimeoutSeconds: 1200
    unhealthyNodeConditions:
    - status: Unknown
      timeoutSeconds: 180
      type: Ready
    - status: "False"
      timeoutSeconds: 180
      type: Ready
  remediation:
    triggerIf:
      unhealthyLessThanOrEqualTo: 100%
  selector:
    matchLabels:
      cluster.x-k8s.io/control-plane: ""
{{- end }}

{{/* Handling control-plane in Hetzner bare-metal. */}}
{{- if eq .Values.mode "bare-metal" }}
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineHealthCheck
metadata:
  name: {{ .Values.global.clusterName }}-control-plane-unhealthy-5m
spec:
  clusterName: {{ .Values.global.clusterName }}
  checks:
    {{/*
      Bare-metal startup takes ~30 minutes — socat + mtr apt install
      is the slow path (both needed for `kubectl port-forward`).
      3600s (60min) gives ~2x headroom for slow mirrors / retries.
    */}}
    nodeStartupTimeoutSeconds: 3600
    unhealthyNodeConditions:
    - status: Unknown
      timeoutSeconds: 180
      type: Ready
    - status: "False"
      timeoutSeconds: 180
      type: Ready
  remediation:
    triggerIf:
      unhealthyLessThanOrEqualTo: 100%
  selector:
    matchLabels:
      cluster.x-k8s.io/control-plane: ""
{{- end }}

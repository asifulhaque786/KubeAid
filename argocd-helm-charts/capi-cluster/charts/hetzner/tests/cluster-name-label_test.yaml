suite: cluster naming and labels
release:
  name: capi-cluster-hetzner
  namespace: default
values:
  - ../ci/values-hybrid-private-network.yaml

tests:
  - it: HetznerCluster carries the cluster.x-k8s.io/name label matching global.clusterName
    template: HetznerCluster.yaml
    asserts:
      - equal:
          path: metadata.labels["cluster.x-k8s.io/name"]
          value: capi-hybrid-private
      - equal:
          path: metadata.name
          value: capi-hybrid-private

  - it: Cluster resource is named after global.clusterName and wires HetznerCluster + KubeadmControlPlane refs
    template: Cluster.yaml
    asserts:
      - equal:
          path: metadata.name
          value: capi-hybrid-private
      - equal:
          path: spec.infrastructureRef.kind
          value: HetznerCluster
      - equal:
          path: spec.infrastructureRef.name
          value: capi-hybrid-private
      - equal:
          path: spec.controlPlaneRef.kind
          value: KubeadmControlPlane
      - equal:
          path: spec.controlPlaneRef.name
          value: capi-hybrid-private-control-plane

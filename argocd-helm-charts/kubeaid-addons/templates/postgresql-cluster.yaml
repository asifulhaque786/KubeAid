{{- if .Values.global.postgresql.enabled }}
{{- $postgresql := .Values.global.postgresql }}

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.global.postgresql.instanceName }}-pgsql
  {{- with $postgresql.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

spec:
  instances: {{ $postgresql.instances }}


  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie

  inheritedMetadata:
    labels:
      velero.io/exclude-from-backup: "true"

  {{- with $postgresql.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  storage:
    size: {{ $postgresql.size }}
    {{- if $postgresql.storageClass }}
    storageClass: {{ $postgresql.storageClass }}
    {{- end }}

  {{- if $postgresql.backups.enabled }}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ .Values.global.postgresql.instanceName }}-pgsql-backups
        serverName: "revision-{{ $postgresql.revision }}"
  {{- end }}

  bootstrap:
    {{- if $postgresql.recover.enabled }}
    recovery:
      source: {{ .Values.global.postgresql.instanceName }}-pgsql
    {{- else }}
    initdb:
      database: {{ .Values.global.postgresql.instanceName }}
      owner: {{ .Values.global.postgresql.instanceName }}
    {{- end }}

  {{- if $postgresql.recover.enabled }}
  externalClusters:
    - name: {{ .Values.global.postgresql.instanceName }}-pgsql
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: {{ .Values.global.postgresql.instanceName }}-pgsql-backups
          serverName: "revision-{{ $postgresql.recover.revision }}"
  {{- end }}

  monitoring:
    enablePodMonitor: false
{{- end }}

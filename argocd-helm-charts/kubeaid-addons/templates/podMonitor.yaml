{{- if 
    .Values.global.postgresql.monitoring.enablePodMonitor 
}}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ if ((.Values.global.postgresql).recover).enabled }}{{ .Values.global.postgresql.instanceName }}-pgsql-recover{{ else }}{{ .Values.global.postgresql.instanceName }}-pgsql{{ end }}
  namespace: {{ .Release.Namespace }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      cnpg.io/cluster: {{ if ((.Values.global.postgresql).recover).enabled }}{{ .Values.global.postgresql.instanceName }}-pgsql-recover{{ else }}{{ .Values.global.postgresql.instanceName }}-pgsql{{ end }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 10s
      scrapeTimeout: 10s
{{- end }}
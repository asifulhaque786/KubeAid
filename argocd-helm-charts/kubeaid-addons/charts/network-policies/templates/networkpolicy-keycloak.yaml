{{- if and ((.Values.global).netpol).enabled ((.Values.global).keycloakx).netpol }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Values.global.netpol.releaseName }}-keycloak-networkpolicy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: keycloakx
      app.kubernetes.io/instance: {{ .Values.global.netpol.releaseName }}

  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ .Values.global.postgresql.instanceName | default "postgresql" }}-pgsql
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.global.netpol.traefik.namespace }}
            {{- range $key, $value := (.Values.global.netpol.traefik.labels | default dict) }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "8443"
              protocol: TCP

    {{- if .Values.global.blackbox.netpol }}
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.global.blackbox.namespace }}
            app.kubernetes.io/name: blackbox-exporter
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "8443"
              protocol: TCP
    {{- end }}

    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: keycloakx
            app.kubernetes.io/instance: {{ .Values.global.netpol.releaseName }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "9000"
              protocol: TCP
{{- end }}

global:
  postgresql:
    enabled: true
    instanceName: lemmy
    instances: 1
    size: 10Gi
    database: lemmy
    owner: lemmy
    monitoring:
      enablePodMonitor: true
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
        cpu: 100m
    backups:
      enabled: false
    logicalbackup:
      enabled: false

# Configuration for the upstream 'lemmy' chart dependency
lemmy:
  serverName: "localhost"

  admin:
    username: lemmy
    email: lemmy@example.com
    # generated on first install or set via existingSecret name in production

  ingress:
    enabled: false

  postgresql:
    enabled: false  # Disable bundled postgres
    host: lemmy-pgsql-rw
    auth:
      username: lemmy
      database: lemmy
      # password: set in production values

  pictrs:
    persistence:
      enabled: true
      size: 10Gi
      accessMode: ReadWriteOnce
    storage:
      method: filesystem
